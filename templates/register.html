{% extends "base.html" %}

{% block body_class %}auth-page{% endblock %}

{% block content %}

<div class="login-wrapper">

    <div class="login-card">

        <h2 class="login-title">Create Account</h2>
        <p class="login-subtitle">Register to get started</p>

        <form method="POST" autocomplete="off">

            <!-- Prevent Autofill -->
            <input type="text" style="display:none">
            <input type="password" style="display:none">

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required autocomplete="nwe-password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
            </div>

            <button type="submit" class="login-btn">Register</button>

        </form>

        <p class="login-footer">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </p>

    </div>

</div>

{% endblock %}
