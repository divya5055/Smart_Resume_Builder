<!DOCTYPE html>
<html>
<head>
    <title>Simple Resume Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }

        form {
            background: white;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .ai-btn {
            background: #2ecc71;
            color: white;
            margin-top: 5px;
        }

        .submit-btn {
            background: #3498db;
            color: white;
            width: 100%;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Simple Resume Form</h2>

<form action="/save_resume" method="POST">

    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Professional Summary</label>
    <textarea id="summary" name="summary" rows="5" placeholder="Write your summary or click AI button..."></textarea>

    <button type="button" class="ai-btn" onclick="enhanceText('summary','summary', this)">
        ✨ Generate AI Summary
    </button>

    <br><br>

    <button type="submit" class="submit-btn">💾 Save Resume</button>

</form>

<script>
function enhanceText(fieldId, section, btn) {
    const text = document.getElementById(fieldId).value;

    if (!text.trim()) {
        alert("Please enter some text first!");
        return;
    }

    btn.innerText = "Generating...";
    btn.disabled = true;

    fetch('/enhance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, section: section })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById(fieldId).value = data.enhanced_text;
    })
    .catch(err => {
        alert("Error generating summary");
        console.error(err);
    })
    .finally(() => {
        btn.innerText = "✨ Generate AI Summary";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
